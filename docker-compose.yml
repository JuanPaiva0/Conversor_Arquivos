services:
  api:
    build: 
      context: ./backend

    container_name: conversor-api

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: 
      context: ./frontend
    
    container_name: conversor-frontend
    
    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    command: npm run dev -- --host

    depends_on:
      - api